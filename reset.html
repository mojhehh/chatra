<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Password reset</title>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Reset your password">
  <script>
    // Suppress Tailwind CDN production warning BEFORE loading
    window.tailwindConfig = {};
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white h-screen min-h-screen flex flex-col relative overflow-hidden">
  <div class="bg-orb bg-orb-blue w-72 h-72 -top-20 -left-10"></div>
  <div class="bg-orb bg-orb-purple w-80 h-80 -bottom-32 -right-6"></div>
  <div class="bg-orb bg-orb-pink w-64 h-64 top-1/4 right-1/4"></div>

  <header class="px-4 pt-4 pb-2 flex items-center justify-between z-10">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center text-xl font-black relative shadow-lg shadow-blue-900/50">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white" opacity="0.95"/>
          <circle cx="7" cy="10" r="1.5" fill="#1e40af" opacity="0.9"/>
          <circle cx="12" cy="10" r="1.5" fill="#1e40af" opacity="0.9"/>
          <circle cx="17" cy="10" r="1.5" fill="#1e40af" opacity="0.9"/>
        </svg>
      </div>
      <div class="flex flex-col">
        <h1 class="font-semibold text-lg text-slate-100">Chatra</h1>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center pb-4 px-3 sm:px-4">
    <div class="glass-card w-full max-w-md p-6 sm:p-8 rounded-2xl">
      <div class="flex flex-col items-center mb-4">
        <h2 class="text-2xl font-semibold text-center mb-1">Reset your password</h2>
        <p class="text-sm text-slate-300 text-center">Set a new password for your account</p>
      </div>

      <div id="status" class="text-sm text-slate-400 mb-3">Checking token…</div>

      <div id="verify-info" style="display:none;" class="text-sm text-slate-300 mb-3">
        <p>Email: <strong id="emailDisplay"></strong></p>
      </div>

      <form id="resetForm" style="display:none;" autocomplete="off" class="flex flex-col gap-3">
        <div>
          <label for="password" class="block text-xs font-medium text-slate-300 mb-1">New password</label>
          <input id="password" name="password" type="password" minlength="6" required class="mb-0 p-3 rounded-xl w-full bg-slate-800/80 border border-slate-600/60 focus:border-sky-400 focus:ring-2 focus:ring-sky-500/60 outline-none transition-all shadow-inner shadow-slate-900/80" placeholder="••••••" />
        </div>

        <div>
          <label for="confirm" class="block text-xs font-medium text-slate-300 mb-1">Confirm password</label>
          <input id="confirm" name="confirm" type="password" minlength="6" required class="mb-0 p-3 rounded-xl w-full bg-slate-800/80 border border-slate-600/60 focus:border-sky-400 focus:ring-2 focus:ring-sky-500/60 outline-none transition-all shadow-inner shadow-slate-900/80" placeholder="••••••" />
        </div>

        <p id="result" class="text-sm text-red-400 min-h-[1.25rem]"></p>

        <button id="submitBtn" type="submit" class="btn-primary w-full p-3 bg-sky-600 hover:bg-sky-700 rounded-lg font-medium transition-colors">Set new password</button>
      </form>

      <p class="mt-4 text-center text-sm"><a href="index.html" class="text-sky-300 hover:text-sky-200 underline underline-offset-4">Back to login</a></p>
    </div>
  </main>

  <script>
    // Derive URLs at runtime - use config or location-based fallback
    window.RECOVERY_WORKER_URL = window.RECOVERY_WORKER_URL || 'https://recovery-modmojheh.modmojheh.workers.dev';
    window.RESET_PAGE_URL = window.RESET_PAGE_URL || (window.location.protocol + '//' + window.location.host + '/reset.html');
  </script>
  <script src="reset.js"></script>
</body>
</html>
